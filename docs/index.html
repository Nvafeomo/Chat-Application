<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat App — Demo screenshots</title>
    <style>
      :root {
        --bg: #0d1117;
        --text: #e6edf3;
        --muted: #8b949e;
        --border: #30363d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p.lead {
        color: var(--muted);
        margin: 0 0 2rem;
        font-size: 0.95rem;
      }
      figure {
        margin: 0 0 2.5rem;
      }
      figcaption {
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: var(--text);
      }
      figure img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chat App — Demo</h1>
      <p class="lead">Lobby and chat room screenshots.</p>

      <figure>
        <figcaption>Lobby</figcaption>
        <img src="screenshots/lobby.png" alt="Chat app lobby" loading="lazy" />
      </figure>

      <figure>
        <figcaption>Chat room</figcaption>
        <img src="screenshots/chatroom.png" alt="Chat room" loading="lazy" />
      </figure>
    </main>
  </body>
</html>
